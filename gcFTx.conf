# gcFTx configuration file
#
# Options in this file use the same names as command-line options.
# Command-line options override values from this file.
# Uncomment the lines you want to use.
#
# Format examples:
#   option=value
#   --option value

# Required station settings
#sound-device=plughw:CARD=Transceiver,DEV=0
#callsign=F4XXX
#locator=AAAA
#serial-device=/dev/ttyACM0

# Required frequency selection: use either band or frequency, not both.
#band=20
#frequency=14074000

# Mode: ft8, ft4, or ft2.
#mode=ft8

# CQ filter mode:
# 0 = listen only, no automatic TX
# 1 = random CQ selection
# 2 = best decode score
# 3 = maximum distance
# 4 = minimum distance
# 5 = maximum SNR
# 6 = minimum SNR
#filter=1

# Optional behavior
#beep=true
#max-same-tx-repeats=6

# RX display format.
# Date/time tokens use strftime syntax. Custom tokens are:
# %SNR, %SCORE, %DT, %FREQ, %TXT
#defview=%Y-%m-%d %H:%M:%S %SNR %SCORE %DT %FREQ ~  %TXT
#defview=%m-%d %H:%M:%S %SNR %SCORE %DT %FREQ ~ %TXT

# Optional CQ selection filters
#snr-min=-18
#only-prefix=JA,VK,ZL
#only-sp-tag=POTA,SOTA,DX
#only-locator-zone=BP:FL,IO:KM
